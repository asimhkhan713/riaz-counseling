name: Trigger Cloudflare Pages deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bump-submodule-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: flexboneai/flexbone-client-sites
          token: ${{ secrets.MONOREPO_PUSH_TOKEN }}
          ref: main
          submodules: recursive

      - name: Bump content submodule pointer to latest
        env:
          CONTENT_SHA: ${{ github.sha }}
        run: |
          git config user.name "riaz-content-bot"
          git config user.email "actions@github.com"
          SHORT_SHA="${CONTENT_SHA:0:7}"

          # Move the submodule to the tip of its tracking branch (this push).
          git submodule update --remote --recursive sites/riazcounseling/content

          if git diff --quiet -- sites/riazcounseling/content; then
            # Pointer already current (e.g. manual bump) — force a deploy anyway.
            echo "Submodule already up to date; pushing empty commit to trigger deploy."
            git commit --allow-empty \
              -m "chore(riazcounseling): content sync trigger (asimhkhan713/riaz-counseling@${SHORT_SHA})"
          else
            # Real pointer change → monorepo deploy.yml detects sites/riazcounseling/
            # changed and rebuilds + deploys the site with the new content.
            git add sites/riazcounseling/content
            git commit \
              -m "chore(riazcounseling): sync content to asimhkhan713/riaz-counseling@${SHORT_SHA}"
          fi

          git push origin main
