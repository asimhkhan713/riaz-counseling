name: Trigger Cloudflare Pages deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-monorepo-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: flexboneai/flexbone-client-sites
          token: ${{ secrets.MONOREPO_PUSH_TOKEN }}
          ref: main

      - name: Push empty commit to trigger Cloudflare deploy
        env:
          CONTENT_SHA: ${{ github.sha }}
        run: |
          git config user.name "riaz-content-bot"
          git config user.email "actions@github.com"
          SHORT_SHA="${CONTENT_SHA:0:7}"
          git commit --allow-empty -m "chore(riazcounseling): content sync trigger (asimhkhan713/riaz-counseling@${SHORT_SHA})"
          git push origin main
