name: Trigger Cloudflare Pages deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger flexbone-site-riazcounseling deploy
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/flexbone-site-riazcounseling/deployments" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -F "branch=main")
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1 | sed 's/HTTP_STATUS://')
          echo "HTTP $STATUS"
          echo "$BODY"
          if [ "$STATUS" -ge 400 ]; then
            exit 1
          fi
